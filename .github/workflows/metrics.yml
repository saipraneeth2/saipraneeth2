name: Profile metrics

    on:
      schedule:
        - cron: "23 7 * * *" # daily 07:23 UTC ≈ just after midnight in Fort Collins
      workflow_dispatch: {} # manual "Run workflow" button

    permissions:
      contents: write

    concurrency:
      group: profile-metrics
      cancel-in-progress: true

    jobs:
      metrics:
        runs-on: ubuntu-latest
        steps:
          - name: Check out profile repo
            uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2 (pinned)

          - name: Generate metrics.svg
            env:
              GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            run: python3 scripts/metrics_card.py saipraneeth2 metrics.svg

          - name: Commit and push if changed
            run: |
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git add metrics.svg
              if git diff --cached --quiet; then
                echo "metrics.svg unchanged — nothing to commit."
              else
                git commit -m "chore: refresh metrics.svg"
                git push
              fi
