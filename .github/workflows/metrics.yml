# Redraws metrics.svg daily using only the built-in GITHUB_TOKEN.
# No personal access token, no third-party metrics service:
# scripts/metrics_card.py is dependency-free Python (stdlib only).
#
# Requires: Settings → Actions → General → Workflow permissions →
# "Read and write permissions" (or the `permissions:` block below suffices
# on repos where the default is read-only).

name: Profile metrics

on:
  schedule:
    - cron: "23 7 * * *" # daily 07:23 UTC ≈ just after midnight in Fort Collins
  workflow_dispatch: {} # manual "Run workflow" button

permissions:
  contents: write

concurrency:
  group: profile-metrics
  cancel-in-progress: true

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Check out profile repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 (pinned)

      - name: Generate metrics.svg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/metrics_card.py saipraneeth2 metrics.svg

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add metrics.svg
          if git diff --cached --quiet; then
            echo "metrics.svg unchanged — nothing to commit."
          else
            git commit -m "chore: refresh metrics.svg"
            git push
          fi
